# Template for Streamlit secrets. The real `secrets.toml` is gitignored
# (see .gitignore) so we don't leak keys.
#
# Local dev: copy this to .streamlit/secrets.toml and paste your key.
# Streamlit Cloud: in the deployed app's "Manage app" → "Secrets" UI,
#   paste the [anthropic] block below and your real key.
#
# The dashboard works without this — the AI panels gate behind a
# password textbox if no key is found in env, secrets, or session.

[anthropic]
api_key = "sk-ant-PASTE-YOUR-KEY-HERE"
